# NOTE: Browser cookies are scoped by hostname, NOT port. Three Keycloaks on
# plain `localhost` share one cookie jar and clobber each other's admin-console
# sessions (symptom: "Cookie not found", login loop). Access each console by a
# distinct hostname instead (*.localtest.me all resolve to 127.0.0.1):
#   ubs admin console : http://ubs.localtest.me:8080/admin/
#   cs  admin console : http://cs.localtest.me:8081/admin/
#   app admin console : http://app.localtest.me:8082/admin/
# The Angular app logs in via http://app.localtest.me:8082/realms/app.
services:
  postgres-ubs:
    image: postgres:16
    environment: { POSTGRES_DB: keycloak, POSTGRES_USER: keycloak, POSTGRES_PASSWORD: keycloak }
  postgres-cs:
    image: postgres:16
    environment: { POSTGRES_DB: keycloak, POSTGRES_USER: keycloak, POSTGRES_PASSWORD: keycloak }
  postgres-app:
    image: postgres:16
    environment: { POSTGRES_DB: keycloak, POSTGRES_USER: keycloak, POSTGRES_PASSWORD: keycloak }

  keycloak-ubs:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-ubs:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports: ["8080:8080"]
    volumes: ["./infra/realms/ubs-realm.json:/opt/keycloak/data/import/ubs-realm.json"]
    depends_on: [postgres-ubs]

  keycloak-cs:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-cs:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports: ["8081:8080"]
    volumes: ["./infra/realms/cs-realm.json:/opt/keycloak/data/import/cs-realm.json"]
    depends_on: [postgres-cs]

  keycloak-app:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-app:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports: ["8082:8080"]
    volumes: ["./infra/realms/app-realm.json:/opt/keycloak/data/import/app-realm.json"]
    depends_on: [postgres-app]

  samba-ad:
    image: nowsci/samba-domain
    environment:
      DOMAIN: ORGA.LOCAL
      DOMAINPASS: Passw0rd!2024
      HOSTIP: 127.0.0.1
    ports: ["389:389", "636:636"]
    privileged: true

  backend:
    build: ./backend
    ports: ["9090:9090"]
    environment:
      # Container-to-container URLs (host uses localhost:8080/8081/8082).
      KEYCLOAK_UBS_SERVER-URL: http://keycloak-ubs:8080
      KEYCLOAK_CS_SERVER-URL: http://keycloak-cs:8081
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: http://keycloak-app:8080/realms/app
      SAMBA_URL: ldap://samba-ad:389
    depends_on: [keycloak-ubs, keycloak-cs, keycloak-app]

  frontend:
    build: ./frontend
    ports: ["4200:80"]
    depends_on: [backend]

  vault:
    image: hashicorp/vault:1.15
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["server", "-dev"]
    ports: ["8200:8200"]
